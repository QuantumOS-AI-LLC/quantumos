    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1c2446 0%, #5f3d82 100%);
            min-height: 100vh;
            overflow-x: hidden;
            min-width: 480px;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.1);
        }
        
        .glass-button {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }
        
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes pulse-glow {
            from {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
            }
            to {
                box-shadow: 0 0 30px rgba(99, 102, 241, 0.8);
            }
        }
        
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        
        .profile-image {
            border: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        
        .social-icon {
            width: 48px;
            height: 48px;
            display: grid;
            place-items: center;
            transition: all 0.3s ease;
        }
        
        .social-icon:hover {
            transform: scale(1.1) rotate(5deg);
        }
        
        .add-to-home-btn {
            background: linear-gradient(45deg, #6366f1, #8b5cf6);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
        
        .link-button {
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.2));
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .link-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            background: linear-gradient(45deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.3));
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); opacity: 1; }
            50% { transform: translateY(-100px) rotate(180deg); opacity: 0.5; }
        }
    </style>
</head>
<body class="text-white">
    <!-- Animated Particles Background -->

        <div class="glass rounded-3xl p-8 max-w-md w-full mx-auto floating">

            </div>
            
            <!-- Website Links -->
            <div class="mb-6">
                <h3 class="text-lg font-semibold mb-3 text-center">My Work</h3>
                <div class="space-y-3">
                    <a href="https://www.mypocketboss.com" class="link-button h-12 w-full py-1 px-4 rounded-xl flex items-center justify-center text-center gap-2" target="_blank">
                        <img class="w-28 mx-auto" src="https://www.mypocketboss.com/assets/img/pocket-boss.png" alt="pocketboss">
                    </a>
                    <a href="https://airassist.ai" class="link-button h-12 w-full py-1 px-4 rounded-xl flex items-center justify-center text-center gap-2" target="_blank">
                        <img class="w-32 mx-auto" src="https://airassist.ai/assets/img/airassist.png" alt="airassist">

                <a href="sms:+14809130155" class="link-button w-full py-3 px-4 rounded-xl block text-center" target="_blank">

        </div>

    <script>
        // Create floating particles
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;
            
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
                particlesContainer.appendChild(particle);
            }
        }
        
        // PWA Installation
        let deferredPrompt;
        const addToHomeScreenBtn = document.getElementById('addToHomeScreen');
        
        // Check if device is iOS
        function isIOS() {
            return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        }
        
        // Show iOS-specific instructions
        function showIOSInstructions() {
            if (isIOS() && !window.navigator.standalone) {
                const modal = document.createElement('div');
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4';
                modal.innerHTML = `
                    <div class="glass rounded-2xl p-6 max-w-sm mx-auto text-center">
                        <h3 class="text-xl font-bold mb-4">Add to Home Screen</h3>
                        <div class="space-y-3 text-sm">
                            <p>1. Tap the <i class="fas fa-share"></i> Share button</p>
                            <p>2. Scroll down and tap "Add to Home Screen"</p>
                            <p>3. Tap "Add" to confirm</p>
                        </div>
                        <button onclick="this.parentElement.parentElement.remove()" class="mt-4 bg-blue-500 px-4 py-2 rounded-lg">
                            Got it!
                        </button>
                    </div>
                `;
                document.body.appendChild(modal);
            }
        }
        
        // Handle PWA installation
        addToHomeScreenBtn.addEventListener('click', async () => {
            if (isIOS()) {
                showIOSInstructions();
                return;
            }
            
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
            } else {
                // Fallback for browsers that don't support PWA
                alert('To add this to your home screen:\n1. Open browser menu\n2. Select "Add to Home Screen"');
            }
        });
        
        // Listen for PWA install prompt
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });
        
        // Track analytics (optional)
        function trackClick(linkType) {
            // Add your analytics tracking here
            console.log('Link clicked:', linkType);
        }
        
        // Add click tracking to all links
        document.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', (e) => {
                const linkText = e.target.textContent || e.target.closest('a').textContent;
                trackClick(linkText.trim());
            });
        });
        
        // Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript;base64,c2VsZi5hZGRFdmVudExpc3RlbmVyKCdpbnN0YWxsJywgZnVuY3Rpb24oZXZlbnQpIHsgZXZlbnQud2FpdFVudGlsKHNlbGYuc2tpcFdhaXRpbmcoKSk7IH0pOyBzZWxmLmFkZEV2ZW50TGlzdGVuZXIoJ2FjdGl2YXRlJywgZnVuY3Rpb24oZXZlbnQpIHsgZXZlbnQud2FpdFVudGlsKHNlbGYuY2xpZW50cy5jbGFpbSgpKTsgfSk7IHNlbGYuYWRkRXZlbnRMaXN0ZW5lcignZmV0Y2gnLCBmdW5jdGlvbihldmVudCkgeyBldmVudC5yZXNwb25kV2l0aChmZXRjaChldmVudC5yZXF1ZXN0KSk7IH0pOw==');
        }
        
        // Initialize particles when page loads
        window.addEventListener('load', () => {
            createParticles();
        });
        
        // Add smooth scrolling and touch interactions
        document.addEventListener('DOMContentLoaded', () => {
            // Add touch feedback for mobile
            const buttons = document.querySelectorAll('.glass-button, .link-button');
            buttons.forEach(button => {
                button.addEventListener('touchstart', () => {
                    button.style.transform = 'scale(0.95)';
                });
                button.addEventListener('touchend', () => {
                    button.style.transform = '';
                });
            });
        });
    </script>
